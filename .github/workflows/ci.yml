name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: "1.26"
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/nikogura/deployment-demo

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: ${{ runner.os }}-go-

    - name: Download Go dependencies
      run: go mod download

    - name: Build UI
      run: cd pkg/ui && npm ci && npm run build

    - name: Run tests
      run: make test

    - name: Install namedreturns
      run: go install github.com/nikogura/namedreturns@latest

    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

    - name: Lint (Go)
      run: |
        echo "Running namedreturns..."
        for pkg in $(go list ./... | grep -v node_modules); do
          namedreturns "$pkg" || exit 1
        done
        echo "Running golangci-lint..."
        golangci-lint run --timeout=5m

    - name: Lint (ESLint)
      run: cd pkg/ui && npx eslint 'app/**/*.{ts,tsx}' 'lib/**/*.{ts,tsx}' 'types/**/*.{ts,tsx}' --max-warnings 0
      continue-on-error: true  # Until ESLint v9 flat config is migrated

  publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        include:
          - version: "1.0.0"
            theme: green
            health: ok
          - version: "1.0.2"
            theme: blue
            health: ok
          - version: "1.0.3"
            theme: red
            health: broken
          - version: "1.0.4"
            theme: green
            health: ok

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push ${{ matrix.version }} (${{ matrix.theme }}, ${{ matrix.health }})
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        build-args: |
          VERSION=${{ matrix.version }}
          THEME=${{ matrix.theme }}
          HEALTH=${{ matrix.health }}
        tags: |
          ${{ env.IMAGE }}:${{ matrix.version }}
        cache-from: type=gha,scope=${{ matrix.version }}
        cache-to: type=gha,scope=${{ matrix.version }},mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Tag repo
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        custom_tag: "1.0.0"
        tag_prefix: "v"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: deployment-demo v1.0.0
        draft: false
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## Deployment Demo — Observability + Lifecycle Demonstration

          Four container images published to `ghcr.io/nikogura/deployment-demo`:

          | Tag | Theme | Health | Purpose |
          |-----|-------|--------|---------|
          | `1.0.0` | Green | Healthy | Baseline deployment |
          | `1.0.2` | Blue | Healthy | Demonstrates version update |
          | `1.0.3` | Red | **Broken** (503 /healthz) | Demonstrates rollback |
          | `1.0.4` | Green | Healthy | Demonstrates fix after rollback |

          ### Quick Start

          ```bash
          # Pull any version
          docker pull ghcr.io/nikogura/deployment-demo:1.0.0

          # Run locally
          docker run -p 8080:8080 ghcr.io/nikogura/deployment-demo:1.0.0

          # Open http://localhost:8080
          ```

          ### Kubernetes

          ```bash
          kubectl apply -k kubernetes/base

          # To change versions, update the image tag in your overlay:
          # images:
          #   - name: ghcr.io/nikogura/deployment-demo
          #     newTag: "1.0.2"
          ```

          ### What each version shows

          - **1.0.0 → 1.0.2**: Version badge changes (green → blue), theme shifts. Metrics show the cutover.
          - **1.0.2 → 1.0.3**: Red theme, "BROKEN" banner, `/healthz` returns 503. K8s probes fail, pods crashloop. Reconciliation engine rolls back.
          - **1.0.3 → 1.0.4**: Green restored, healthy. Demonstrates the fix.

          All versions emit Prometheus RED metrics (`/metrics`), structured JSON logs to stdout, and OpenTelemetry traces to Tempo (when `DEMO_TEMPO_URL` is set).
