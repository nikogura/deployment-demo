name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/nikogura/deployment-demo

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: ${{ runner.os }}-go-

    - name: Download Go dependencies
      run: go mod download

    - name: Build UI
      run: cd pkg/ui && npm ci && npm run build

    - name: Run tests
      run: make test

    - name: Install namedreturns
      run: go install github.com/nikogura/namedreturns@latest

    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

    - name: Lint (Go)
      run: |
        echo "Running namedreturns..."
        for pkg in $(go list ./... | grep -v node_modules); do
          namedreturns "$pkg" || exit 1
        done
        echo "Running golangci-lint..."
        golangci-lint run --timeout=5m

    - name: Lint (ESLint)
      run: cd pkg/ui && npx eslint 'app/**/*.{ts,tsx}' 'lib/**/*.{ts,tsx}' 'types/**/*.{ts,tsx}' --max-warnings 0
      continue-on-error: true  # Until ESLint v9 flat config is migrated

  publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        include:
          - version: "1.0.0"
            theme: green
            health: ok
          - version: "1.0.2"
            theme: blue
            health: ok
          - version: "1.0.3"
            theme: red
            health: broken
          - version: "1.0.4"
            theme: green
            health: ok

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push ${{ matrix.version }} (${{ matrix.theme }}, ${{ matrix.health }})
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        build-args: |
          VERSION=${{ matrix.version }}
          THEME=${{ matrix.theme }}
          HEALTH=${{ matrix.health }}
        tags: |
          ${{ env.IMAGE }}:${{ matrix.version }}
        cache-from: type=gha,scope=${{ matrix.version }}
        cache-to: type=gha,scope=${{ matrix.version }},mode=max
