apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-demo
  namespace: deployment-demo
  labels:
    app.kubernetes.io/name: deployment-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: deployment-demo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deployment-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: demo
          image: ghcr.io/nikogura/deployment-demo:1.0.0
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: DEMO_PORT
              value: ":8080"
            - name: DEMO_SERVICE_NAME
              value: "deployment-demo"
            # Set DEMO_TEMPO_URL in the overlay when Tempo is available.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
